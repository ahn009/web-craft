services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: webcraft
      POSTGRES_PASSWORD: webcraft_secret
      POSTGRES_DB: webcraft
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webcraft -d webcraft"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - webcraft

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://webcraft:webcraft_secret@db:5432/webcraft
      JWT_SECRET: ${JWT_SECRET:-local-docker-development-secret-please-override}
      PORT: "3000"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ZIP_PATH: ../n8n-workflow-templates-main.zip
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@webcraft.ai}
      NODE_ENV: ${NODE_ENV:-production}
      ENABLE_TEST_ROUTES: "false"
      CHECKOUT_MODE: ${CHECKOUT_MODE:-disabled}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => { r.resume(); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - webcraft
    # Uncomment for development with hot reload:
    # volumes:
    #   - ./backend/src:/app/backend/src
    #   - ./backend/prisma:/app/backend/prisma

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-local-n8n-development-key}
    ports:
      - "5678:5678"
    volumes:
      - n8ndata:/home/node/.n8n
    networks:
      - webcraft

volumes:
  pgdata:
    driver: local
  n8ndata:
    driver: local

networks:
  webcraft:
    driver: bridge
