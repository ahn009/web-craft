services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: webcraft
      POSTGRES_PASSWORD: webcraft_secret
      POSTGRES_DB: webcraft
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webcraft -d webcraft"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - webcraft

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://webcraft:webcraft_secret@db:5432/webcraft
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3000"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ZIP_PATH: ../n8n-workflow-templates-main.zip
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@webcraft.ai}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - webcraft
    # Uncomment for development with hot reload:
    # volumes:
    #   - ./backend/src:/app/backend/src
    #   - ./backend/prisma:/app/backend/prisma

volumes:
  pgdata:
    driver: local

networks:
  webcraft:
    driver: bridge
